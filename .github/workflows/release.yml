name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/global-live-translator-release.p12
      ANDROID_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_RELEASE_STORE_PASSWORD }}
      ANDROID_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_RELEASE_KEY_ALIAS }}
      ANDROID_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_RELEASE_KEY_PASSWORD }}
      EXPECTED_CERT_SHA256: 82e09ad2059c7dd3cbd25261eee1fcec94b3daf223f27f69c7c67d8d9e48257e

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Restore release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          test -n "$ANDROID_RELEASE_STORE_PASSWORD"
          test -n "$ANDROID_RELEASE_KEY_ALIAS"
          test -n "$ANDROID_RELEASE_KEY_PASSWORD"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_RELEASE_KEYSTORE_PATH"
          chmod 600 "$ANDROID_RELEASE_KEYSTORE_PATH"

      - name: Validate release version
        run: |
          VERSION_NAME="$(sed -nE 's/^[[:space:]]*versionName = "([^"]+)".*/\1/p' app/build.gradle.kts)"
          test -n "$VERSION_NAME"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            test "$GITHUB_REF_NAME" = "v$VERSION_NAME"
          fi
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"

      - name: Test, lint, and build signed APK
        run: gradle --no-daemon --no-configuration-cache :app:testDebugUnitTest :app:lintRelease :app:assembleRelease

      - name: Verify and package APK
        run: |
          APK="app/build/outputs/apk/release/app-release.apk"
          APKSIGNER="$ANDROID_HOME/build-tools/35.0.0/apksigner"
          test -f "$APK"
          "$APKSIGNER" verify --verbose --print-certs "$APK"
          CERT_SHA256="$("$APKSIGNER" verify --print-certs "$APK" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p')"
          test "$CERT_SHA256" = "$EXPECTED_CERT_SHA256"
          mkdir -p dist
          cp "$APK" "dist/global-live-translator-android-v$VERSION_NAME.apk"
          cd dist
          sha256sum "global-live-translator-android-v$VERSION_NAME.apk" > "global-live-translator-android-v$VERSION_NAME.apk.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: global-live-translator-android-release
          path: dist/
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub prerelease
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/global-live-translator-android-v$VERSION_NAME.apk" \
            "dist/global-live-translator-android-v$VERSION_NAME.apk.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --prerelease \
            --title "Global Live Translator Android v$VERSION_NAME" \
            --notes "首个 Android 预发布版本。支持 Android 10+ 内部音频捕获、Gemini Live 实时翻译、悬浮字幕，以及 Clash Meta VPN/TUN 或手动代理。Gemini Live Translate 仍为 Preview；部分 DRM、通话及禁止音频捕获的 App 无法使用。"

      - name: Remove release keystore
        if: always()
        run: rm -f "$ANDROID_RELEASE_KEYSTORE_PATH"
